version: 1
project: angstrem-content-factory
description: Стартовый комплект конфигурации для развертывания контент-завода Ангстрем в Dockhost.

environment:
  variables:
    POSTGRES_USER: ${POSTGRES_USER}
    POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    POSTGRES_DB: ${POSTGRES_DB}
    REDIS_PASSWORD: ${REDIS_PASSWORD}
    DIRECTUS_VERSION: ${DIRECTUS_VERSION}
    DIRECTUS_PORT: ${DIRECTUS_PORT}
    DIRECTUS_PUBLIC_URL: ${DIRECTUS_PUBLIC_URL}
    DIRECTUS_CORS_ORIGIN: ${DIRECTUS_CORS_ORIGIN}
    DIRECTUS_SECRET: ${DIRECTUS_SECRET}
    DIRECTUS_ADMIN_EMAIL: ${DIRECTUS_ADMIN_EMAIL}
    DIRECTUS_ADMIN_PASSWORD: ${DIRECTUS_ADMIN_PASSWORD}
    DIRECTUS_DB_NAME: ${DIRECTUS_DB_NAME}
    DIRECTUS_DB_USER: ${DIRECTUS_DB_USER}
    DIRECTUS_DB_PASSWORD: ${DIRECTUS_DB_PASSWORD}
    N8N_VERSION: ${N8N_VERSION}
    N8N_PORT: ${N8N_PORT}
    N8N_HOST: ${N8N_HOST}
    N8N_WEBHOOK_URL: ${N8N_WEBHOOK_URL}
    N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
    N8N_DB_NAME: ${N8N_DB_NAME}
    N8N_DB_USER: ${N8N_DB_USER}
    N8N_DB_PASSWORD: ${N8N_DB_PASSWORD}
    N8N_WORKER_CONCURRENCY: ${N8N_WORKER_CONCURRENCY}
    OPENWEBUI_VERSION: ${OPENWEBUI_VERSION}
    OPENWEBUI_PORT: ${OPENWEBUI_PORT}
    OPENWEBUI_SECRET_KEY: ${OPENWEBUI_SECRET_KEY}
    LITELLM_PORT: ${LITELLM_PORT}
    LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
    LITELLM_DB_NAME: ${LITELLM_DB_NAME}
    LITELLM_DB_USER: ${LITELLM_DB_USER}
    LITELLM_DB_PASSWORD: ${LITELLM_DB_PASSWORD}
    LITELLM_UI_USERNAME: ${LITELLM_UI_USERNAME}
    LITELLM_UI_PASSWORD: ${LITELLM_UI_PASSWORD}
    OPENAI_API_KEY: ${OPENAI_API_KEY}
    ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    GEMINI_API_KEY: ${GEMINI_API_KEY}
    GIGACHAT_API_KEY: ${GIGACHAT_API_KEY}
    YANDEXGPT_API_KEY: ${YANDEXGPT_API_KE
    MINIO_ROOT_USER: ${MINIO_ROOT_USER}
    MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    MINIO_PORT: ${MINIO_PORT}
    MINIO_CONSOLE_PORT: ${MINIO_CONSOLE_PORT}
    MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL}
    QDRANT_PORT: ${QDRANT_PORT}
    UPTIME_KUMA_PORT: ${UPTIME_KUMA_PORT}
    DIRECTUS_API_URL: ${DIRECTUS_API_URL}
    DIRECTUS_API_TOKEN: ${DIRECTUS_API_TOKEN}
    LITELLM_API_URL: ${LITELLM_API_URL}
    LITELLM_API_KEY: ${LITELLM_API_KEY}
    BITRIX_PUBLICATION_API_URL: ${BITRIX_PUBLICATION_API_URL}
    BITRIX_PUBLICATION_API_TOKEN: ${BITRIX_PUBLICATION_API_TOKEN}
    TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
    TELEGRAM_CONTENT_CHAT_ID: ${TELEGRAM_CONTENT_CHAT_ID}

volumes:
  postgres-data:
    type: ssd
    size: 10GiB
  redis-data:
    type: ssd
    size: 2GiB
  minio-data:
    type: ssd
    size: 20GiB
  qdrant-storage:
    type: ssd
    size: 10GiB
  directus-uploads:
    type: ssd
    size: 10GiB
  directus-extensions:
    type: ssd
    size: 1GiB
  n8n-data:
    type: ssd
    size: 2GiB
  openwebui-data:
    type: ssd
    size: 5GiB
  litellm-data:
    type: ssd
    size: 2GiB
  uptime-kuma-data:
    type: ssd
    size: 1GiB
  postgres-init:
    type: ssd
    size: 1GiB

containers:
  cf-postgres:
    image: postgres:16-alpine
    replicas: 1
    resources:
      memory: 1024MiB
      cpu: 1
      cpuFraction: 20
    variables:
      POSTGRES_USER: $POSTGRES_USER
      POSTGRES_PASSWORD: $POSTGRES_PASSWORD
      POSTGRES_DB: $POSTGRES_DB
      DIRECTUS_DB_NAME: $DIRECTUS_DB_NAME
      DIRECTUS_DB_USER: $DIRECTUS_DB_USER
      DIRECTUS_DB_PASSWORD: $DIRECTUS_DB_PASSWORD
      N8N_DB_NAME: $N8N_DB_NAME
      N8N_DB_USER: $N8N_DB_USER
      N8N_DB_PASSWORD: $N8N_DB_PASSWORD
      LITELLM_DB_NAME: $LITELLM_DB_NAME
      LITELLM_DB_USER: $LITELLM_DB_USER
      LITELLM_DB_PASSWORD: $LITELLM_DB_PASSWORD
    volumes:
      - name: postgres-data
        mountPath: /var/lib/postgresql/data
      - name: postgres-init
        mountPath: /docker-entrypoint-initdb.d

  cf-redis:
    image: redis:7-alpine
    replicas: 1
    resources:
      memory: 256MiB
      cpu: 1
      cpuFraction: 20
    cmd:
      - redis-server
      - --appendonly
      - "yes"
      - --requirepass
      - $REDIS_PASSWORD
    volumes:
      - name: redis-data
        mountPath: /data

  cf-minio:
    image: minio/minio:latest
    replicas: 1
    resources:
      memory: 512MiB
      cpu: 1
      cpuFraction: 20
    cmd:
      - server
      - /data
      - --console-address
      - :9001
    variables:
      MINIO_ROOT_USER: $MINIO_ROOT_USER
      MINIO_ROOT_PASSWORD: $MINIO_ROOT_PASSWORD
      MINIO_BROWSER_REDIRECT_URL: $MINIO_PUBLIC_URL
    ports:
      - 9000
      - 9001
    volumes:
      - name: minio-data
        mountPath: /data

  cf-qdrant:
    image: qdrant/qdrant:latest
    replicas: 1
    resources:
      memory: 512MiB
      cpu: 1
      cpuFraction: 20
    ports:
      - 6333
    volumes:
      - name: qdrant-storage
        mountPath: /qdrant/storage

  cf-directus:
    image: directus/directus:$DIRECTUS_VERSION
    replicas: 1
    resources:
      memory: 1024MiB
      cpu: 1
      cpuFraction: 20
    ports:
      - 8055
    variables:
      KEY: $DIRECTUS_SECRET
      SECRET: $DIRECTUS_SECRET
      ADMIN_EMAIL: $DIRECTUS_ADMIN_EMAIL
      ADMIN_PASSWORD: $DIRECTUS_ADMIN_PASSWORD
      PUBLIC_URL: $DIRECTUS_PUBLIC_URL
      CORS_ENABLED: "true"
      CORS_ORIGIN: $DIRECTUS_CORS_ORIGIN
      DB_CLIENT: pg
      DB_HOST: cf-postgres
      DB_PORT: "5432"
      DB_DATABASE: $DIRECTUS_DB_NAME
      DB_USER: $DIRECTUS_DB_USER
      DB_PASSWORD: $DIRECTUS_DB_PASSWORD
      REDIS_ENABLED: "true"
      REDIS: redis://:$REDIS_PASSWORD@cf-redis:6379
      WEBSOCKETS_ENABLED: "true"
    volumes:
      - name: directus-uploads
        mountPath: /directus/uploads
      - name: directus-extensions
        mountPath: /directus/extensions

  cf-n8n:
    image: n8nio/n8n:$N8N_VERSION
    replicas: 1
    resources:
      memory: 1024MiB
      cpu: 1
      cpuFraction: 20
    ports:
      - 5678
    variables:
      N8N_HOST: $N8N_HOST
      N8N_PORT: $N8N_PORT
      N8N_PROTOCOL: https
      WEBHOOK_URL: $N8N_WEBHOOK_URL
      N8N_ENCRYPTION_KEY: $N8N_ENCRYPTION_KEY
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: cf-postgres
      DB_POSTGRESDB_PORT: "5432"
      DB_POSTGRESDB_DATABASE: $N8N_DB_NAME
      DB_POSTGRESDB_USER: $N8N_DB_USER
      DB_POSTGRESDB_PASSWORD: $N8N_DB_PASSWORD
      QUEUE_BULL_REDIS_HOST: cf-redis
      QUEUE_BULL_REDIS_PORT: "6379"
      QUEUE_BULL_REDIS_PASSWORD: $REDIS_PASSWORD
      N8N_RUNNERS_ENABLED: "true"
      N8N_METRICS: "true"
      DIRECTUS_API_URL: $DIRECTUS_API_URL
      DIRECTUS_API_TOKEN: $DIRECTUS_API_TOKEN
      LITELLM_API_URL: $LITELLM_API_URL
      LITELLM_API_KEY: $LITELLM_API_KEY
      BITRIX_PUBLICATION_API_URL: $BITRIX_PUBLICATION_API_URL
      BITRIX_PUBLICATION_API_TOKEN: $BITRIX_PUBLICATION_API_TOKEN
      TELEGRAM_BOT_TOKEN: $TELEGRAM_BOT_TOKEN
      TELEGRAM_CONTENT_CHAT_ID: $TELEGRAM_CONTENT_CHAT_ID
    volumes:
      - name: n8n-data
        mountPath: /home/node/.n8n

  cf-openwebui:
    image: ghcr.io/open-webui/open-webui:$OPENWEBUI_VERSION
    replicas: 1
    resources:
      memory: 1024MiB
      cpu: 1
      cpuFraction: 20
    ports:
      - 3000
    variables:
      WEBUI_SECRET_KEY: $OPENWEBUI_SECRET_KEY
      OPENAI_API_BASE_URL: $LITELLM_API_URL
      OPENAI_API_KEY: $LITELLM_API_KEY
    volumes:
      - name: openwebui-data
        mountPath: /app/backend/data

  cf-litellm:
    image: ghcr.io/berriai/litellm:main-latest
    replicas: 1
    resources:
      memory: 512MiB
      cpu: 1
      cpuFraction: 20
    ports:
      - 4000
    variables:
      LITELLM_MASTER_KEY: $LITELLM_MASTER_KEY
      DATABASE_URL: postgresql://$LITELLM_DB_USER:$LITELLM_DB_PASSWORD@cf-postgres:5432/$LITELLM_DB_NAME
      UI_USERNAME: $LITELLM_UI_USERNAME
      UI_PASSWORD: $LITELLM_UI_PASSWORD
      OPENAI_API_KEY: $OPENAI_API_KEY
      ANTHROPIC_API_KEY: $ANTHROPIC_API_KEY
      GEMINI_API_KEY: $GEMINI_API_KEY
      GIGACHAT_API_KEY: $GIGACHAT_API_KEY
      YANDEXGPT_API_KEY: $YANDEXGPT_API_KEY
    volumes:
      - name: litellm-data
        mountPath: /app/data

  cf-uptime-kuma:
    image: louislam/uptime-kuma:latest
    replicas: 1
    resources:
      memory: 256MiB
      cpu: 1
      cpuFraction: 20
    ports:
      - 3001
    volumes:
      - name: uptime-kuma-data
        mountPath: /app/data

network:
  domains:
    content-domain:
      host: content.angstrem-mebel.pro
    n8n-domain:
      host: n8n-content.angstrem-mebel.pro
    ai-domain:
      host: ai-content.angstrem-mebel.pro
    llm-domain:
      host: llm-content.angstrem-mebel.pro
    files-domain:
      host: files-content.angstrem-mebel.pro
    status-domain:
      host: status-content.angstrem-mebel.pro

  services:
    directus-service:
      container: cf-directus
      ports:
        - 8055
    n8n-service:
      container: cf-n8n
      ports:
        - 5678
    openwebui-service:
      container: cf-openwebui
      ports:
        - 3000
    litellm-service:
      container: cf-litellm
      ports:
        - 4000
    minio-service:
      container: cf-minio
      ports:
        - 9000
    uptime-service:
      container: cf-uptime-kuma
      ports:
        - 3001

  routes:
    directus-route:
      domain: content-domain
      service: directus-service
      port: 8055
      path: /
    n8n-route:
      domain: n8n-domain
      service: n8n-service
      port: 5678
      path: /
    openwebui-route:
      domain: ai-domain
      service: openwebui-service
      port: 3000
      path: /
    litellm-route:
      domain: llm-domain
      service: litellm-service
      port: 4000
      path: /
    minio-route:
      domain: files-domain
      service: minio-service
      port: 9000
      path: /
    uptime-route:
      domain: status-domain
      service: uptime-service
      port: 3001
  
