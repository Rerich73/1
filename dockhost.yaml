﻿project:
  name: angstrem-content-factory
  description: AI-контент-фабрика Ангстрем на Dockhost

network:
  name: angstrem-content-factory-net

volumes:
  pgdirectusdata:
    size: 50Gi
  pgn8ndata:
    size: 30Gi
  pglitellmdata:
    size: 20Gi
  redisdata:
    size: 5Gi
  miniodata:
    size: 100Gi
  qdrantstorage:
    size: 50Gi
  directusuploads:
    size: 30Gi
  directusextensions:
    size: 5Gi
  n8ndata:
    size: 20Gi
  openwebuidata:
    size: 30Gi
  litellmdata:
    size: 10Gi
  uptimekumadata:
    size: 5Gi

env:
  DIRECTUS_SECRET: "REPLACE_WITH_DIRECTUS_SECRET"
  N8N_ENCRYPTION_KEY: "REPLACE_WITH_N8N_ENCRYPTION_KEY"
  OPENWEBUI_SECRET_KEY: "REPLACE_WITH_OPENWEBUI_SECRET"
  LITELLM_MASTER_KEY: "sk-REPLACE_WITH_LITELLM_MASTERKEY"

  POSTGRES_DIRECTUS_PASSWORD: "REPLACE_WITH_PG_DIRECTUS_PASSWORD"
  POSTGRES_N8N_PASSWORD: "REPLACE_WITH_PG_N8N_PASSWORD"
  POSTGRES_LITELLM_PASSWORD: "REPLACE_WITH_PG_LITELLM_PASSWORD"

  REDIS_PASSWORD: "REPLACE_WITH_REDIS_PASSWORD"
  MINIO_ROOT_PASSWORD: "REPLACE_WITH_MINIO_ROOT_PASSWORD"

  TELEGRAM_BOT_TOKEN: "REPLACE_WITH_TELEGRAM_BOT_TOKEN"
  TELEGRAM_CONTENT_CHAT_ID: "REPLACE_WITH_TELEGRAM_CHAT_ID"

  OPENAI_API_KEY: "REPLACE_WITH_OPENAI_API_KEY"
  ANTHROPIC_API_KEY: "REPLACE_WITH_ANTHROPIC_API_KEY"
  GEMINI_API_KEY: "REPLACE_WITH_GEMINI_API_KEY"
  GIGACHAT_API_KEY: "REPLACE_WITH_GIGACHAT_API_KEY"
  YANDEXGPT_API_KEY: "REPLACE_WITH_YANDEXGPT_API_KEY"

  BITRIX_PUBLICATION_API_TOKEN: "REPLACE_WITH_BITRIX_TOKEN"

services:
  pg-directus:
    image: postgres:16-alpine
    restart: always
    cpus: "1"
    memory: "1024Mi"
    ports:
      - "5433:5432"
    env:
      POSTGRES_USER: directus
      POSTGRES_PASSWORD: ${POSTGRES_DIRECTUS_PASSWORD}
      POSTGRES_DB: directus
    volumes:
      - name: pgdirectusdata
        mountPath: /var/lib/postgresql/data

  pg-n8n:
    image: postgres:16-alpine
    restart: always
    cpus: "1"
    memory: "1024Mi"
    env:
      POSTGRES_USER: n8n
      POSTGRES_PASSWORD: ${POSTGRES_N8N_PASSWORD}
      POSTGRES_DB: n8n
    volumes:
      - name: pgn8ndata
        mountPath: /var/lib/postgresql/data

  pg-litellm:
    image: postgres:16-alpine
    restart: always
    cpus: "1"
    memory: "1024Mi"
    env:
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: ${POSTGRES_LITELLM_PASSWORD}
      POSTGRES_DB: litellm
    volumes:
      - name: pglitellmdata
        mountPath: /var/lib/postgresql/data

  cf-redis:
    image: redis:7-alpine
    restart: always
    cpus: "1"
    memory: "512Mi"
    command: >
      redis-server --appendonly yes
      --requirepass "${REDIS_PASSWORD}"
    ports:
      - "6379:6379"
    volumes:
      - name: redisdata
        mountPath: /data

  cf-minio:
    image: minio/minio:latest
    restart: always
    cpus: "1"
    memory: "1024Mi"
    command: server /data --console-address ":9001"
    env:
      MINIO_ROOT_USER: contentminioadmin
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BROWSER_REDIRECT_URL: "https://files-content.angstrem-mebel.pro"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - name: miniodata
        mountPath: /data

  cf-qdrant:
    image: qdrant/qdrant:latest
    restart: always
    cpus: "1"
    memory: "2048Mi"
    ports:
      - "6333:6333"
    volumes:
      - name: qdrantstorage
        mountPath: /qdrant/storage

  cf-directus:
    image: directus/directus:11.17.0
    restart: always
    cpus: "2"
    memory: "2048Mi"
    depends_on:
      - pg-directus
      - cf-redis
      - cf-minio
    ports:
      - "8055:8055"
    env:
      KEY: "${DIRECTUS_SECRET}"
      SECRET: "${DIRECTUS_SECRET}"
      ADMIN_EMAIL: "REPLACE_WITH_DIRECTUS_ADMIN_EMAIL"
      ADMIN_PASSWORD: "REPLACE_WITH_DIRECTUS_ADMIN_PASSWORD"
      PUBLIC_URL: "https://content.angstrem-mebel.pro"

      CORS_ENABLED: "true"
      CORS_ORIGIN: "https://content.angstrem-mebel.pro,https://n8n-content.angstrem-mebel.pro,https://ai-content.angstrem-mebel.pro"

      DB_CLIENT: "pg"
      DB_HOST: "pg-directus"
      DB_PORT: "5432"
      DB_DATABASE: "directus"
      DB_USER: "directus"
      DB_PASSWORD: "${POSTGRES_DIRECTUS_PASSWORD}"

      REDIS_ENABLED: "true"
      REDIS: "redis://:${REDIS_PASSWORD}@cf-redis:6379"

      WEBSOCKETS_ENABLED: "true"

      STORAGE_LOCATIONS: "minio"
      STORAGE_MINIO_DRIVER: "s3"
      STORAGE_MINIO_KEY: "contentminioadmin"
      STORAGE_MINIO_SECRET: "${MINIO_ROOT_PASSWORD}"
      STORAGE_MINIO_BUCKET: "directus"
      STORAGE_MINIO_REGION: "us-east-1"
      STORAGE_MINIO_ENDPOINT: "http://cf-minio:9000"
      STORAGE_MINIO_FORCE_PATH_STYLE: "true"
    volumes:
      - name: directusuploads
        mountPath: /directus/uploads
      - name: directusextensions
        mountPath: /directus/extensions

  cf-litellm:
    image: ghcr.io/berriai/litellm:main-latest
    restart: always
    cpus: "2"
    memory: "2048Mi"
    depends_on:
      - pg-litellm
    ports:
      - "4000:4000"
    env:
      LITELLM_MASTER_KEY: "${LITELLM_MASTER_KEY}"
      DATABASE_URL: "postgresql://litellm:${POSTGRES_LITELLM_PASSWORD}@pg-litellm:5432/litellm"
      UI_USERNAME: "admin"
      UI_PASSWORD: "REPLACE_WITH_LITELLM_ADMIN_PASSWORD"

      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
      GEMINI_API_KEY: "${GEMINI_API_KEY}"
      GIGACHAT_API_KEY: "${GIGACHAT_API_KEY}"
      YANDEXGPT_API_KEY: "${YANDEXGPT_API_KEY}"
    volumes:
      - name: litellmdata
        mountPath: /app/data

  cf-n8n:
    image: n8nio/n8n:1.111.0
    restart: always
    cpus: "2"
    memory: "2048Mi"
    depends_on:
      - pg-n8n
    ports:
      - "5678:5678"
    env:
      N8N_HOST: "n8n-content.angstrem-mebel.pro"
      N8N_PORT: "5678"
      N8N_PROTOCOL: "https"
      WEBHOOK_URL: "https://n8n-content.angstrem-mebel.pro"

      N8N_ENCRYPTION_KEY: "${N8N_ENCRYPTION_KEY}"
      N8N_RUNNERS_ENABLED: "true"
      N8N_METRICS: "true"

      DB_TYPE: "postgresdb"
      DB_POSTGRESDB_HOST: "pg-n8n"
      DB_POSTGRESDB_PORT: "5432"
      DB_POSTGRESDB_DATABASE: "n8n"
      DB_POSTGRESDB_USER: "n8n"
      DB_POSTGRESDB_PASSWORD: "${POSTGRES_N8N_PASSWORD}"

      DIRECTUS_API_URL: "https://content.angstrem-mebel.pro"
      LITELLM_API_URL: "https://llm-content.angstrem-mebel.pro/v1/chat/completions"
      LITELLM_API_KEY: "${LITELLM_MASTER_KEY}"

      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN}"
      TELEGRAM_CONTENT_CHAT_ID: "${TELEGRAM_CONTENT_CHAT_ID}"

      BITRIX_PUBLICATION_API_URL: "https://www.angstrem-mebel.pro/api/content-factory"
      BITRIX_PUBLICATION_API_TOKEN: "${BITRIX_PUBLICATION_API_TOKEN}"
    volumes:
      - name: n8ndata
        mountPath: /home/node/.n8n

  cf-openwebui:
    image: ghcr.io/open-webui/open-webui:main
    restart: always
    cpus: "1"
    memory: "2048Mi"
    depends_on:
      - cf-litellm
    ports:
      - "3000:3000"
    env:
      WEBUI_SECRET_KEY: "${OPENWEBUI_SECRET_KEY}"
      OPENAI_API_BASE_URL: "https://llm-content.angstrem-mebel.pro/v1"
      OPENAI_API_KEY: "${LITELLM_MASTER_KEY}"
    volumes:
      - name: openwebuidata
        mountPath: /app/backend/data

  cf-uptime-kuma:
    image: louislam/uptime-kuma:latest
    restart: always
    cpus: "1"
    memory: "1024Mi"
    ports:
      - "3001:3001"
    volumes:
      - name: uptimekumadata
        mountPath: /app/data
